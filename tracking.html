<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rastreo de Orden | BlackHouse</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f0f0f; color: white; display: flex; justify-content: center; padding: 20px; font-family: sans-serif;}
        .card { background: #1a1a1a; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: white; }
        button { width: 96%; padding: 12px; background: #10b981; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px;}
        .estado-box { background: #222; padding: 15px; border-radius: 8px; margin-top: 20px; }
        #video-container { margin-top: 20px; width: 100%; border-radius: 8px; overflow: hidden; background: #000; border: 2px solid #333; display: none; }
        video { width: 100%; display: block; }
        .live-badge { display: inline-block; background: red; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; animation: pulse 1.5s infinite; margin-bottom: 10px;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo-blackhouse.png" alt="BlackHouse" style="height: 50px; margin-bottom: 10px;" onerror="this.style.display='none'">
        <h2 style="margin:0 0 15px 0;">Rastreo de Reparación</h2>
        <input type="number" id="orderId" placeholder="Número de orden">
        <button onclick="buscar()">Buscar Orden</button>
        <div id="resultado"></div>

        <div id="video-container">
            <!-- Aquí se inyecta el video grabado o en vivo -->
        </div>
    </div>

    <script>
        let supabaseClient;
        let peerConnection;
        let currentChannel;

        async function initSupabase() {
            if (supabaseClient) return supabaseClient;
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                supabaseClient = supabase.createClient(config.url, config.key);
                return supabaseClient;
            } catch (err) {
                console.error("Error cargando configuración de BD", err);
                return null;
            }
        }

        async function buscar() {
            const id = document.getElementById('orderId').value.trim();
            if (!id) return;
            
            const resultado = document.getElementById('resultado');
            const vContainer = document.getElementById('video-container');
            resultado.innerHTML = '<div class="estado-box">Buscando...</div>';
            vContainer.style.display = 'none';
            vContainer.innerHTML = '';
            
            if (currentChannel) {
                currentChannel.unsubscribe();
                currentChannel = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            try {
                const res = await fetch('/api/db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'select',
                        table: 'ordenes',
                        select: 'modelo, estado, modo_transmision, video_url',
                        match: { id: id },
                        single: true
                    })
                });
                
                const { data, error } = await res.json();
                
                if (error || !data) {
                    resultado.innerHTML = '<div class="estado-box" style="color:#ef4444;">Orden no encontrada.</div>';
                } else {
                    resultado.innerHTML = `
                        <div class="estado-box">
                            <h3 style="margin: 0 0 10px 0;">${data.modelo}</h3>
                            Estado: <strong style="color: #10b981;">${data.estado}</strong>
                        </div>
                    `;

                    // Lógica de video
                    if (data.modo_transmision === 'Grabado' && data.video_url) {
                        vContainer.style.display = 'block';
                        vContainer.innerHTML = `
                            <div style="padding: 10px; background: #222; text-align: left; font-size: 13px; color: #aaa;">
                                <i style="margin-right: 5px;">📼</i> Reparación Grabada
                            </div>
                            <video src="${data.video_url}" controls playsinline></video>
                        `;
                    } else if (data.modo_transmision === 'En Vivo') {
                        vContainer.style.display = 'block';
                        vContainer.innerHTML = `
                            <div style="padding: 10px; background: #222; text-align: left; font-size: 13px;">
                                <span class="live-badge">EN VIVO</span> Conectando con el laboratorio...
                            </div>
                            <video id="liveVideo" autoplay playsinline muted></video>
                        `;
                        conectarEnVivo(id);
                    }
                }
            } catch (err) {
                console.error("Error al buscar", err);
                resultado.innerHTML = '<div class="estado-box" style="color:#ef4444;">Error de conexión.</div>';
            }
        }

        async function conectarEnVivo(ordenId) {
            const client = await initSupabase();
            if (!client) return;

            const roomName = 'reparacion_' + ordenId;
            currentChannel = client.channel(roomName);
            const viewerId = 'viewer_' + Math.random().toString(36).substr(2, 9);
            const videoEl = document.getElementById('liveVideo');

            peerConnection = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });

            peerConnection.ontrack = (event) => {
                if (videoEl.srcObject !== event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                    // Intentar reproducir con sonido si el navegador lo permite
                    videoEl.play().catch(e => {
                        videoEl.muted = true;
                        videoEl.play();
                    });
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    currentChannel.send({
                        type: 'broadcast',
                        event: 'ice-candidate',
                        payload: { viewerId, candidate: event.candidate }
                    });
                }
            };

            currentChannel
                .on('broadcast', { event: 'offer' }, async (payload) => {
                    if (payload.payload.viewerId === viewerId) {
                        const offer = payload.payload.offer;
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        currentChannel.send({
                            type: 'broadcast',
                            event: 'answer',
                            payload: { viewerId, answer }
                        });
                    }
                })
                .on('broadcast', { event: 'ice-candidate' }, async (payload) => {
                    if (payload.payload.viewerId === viewerId) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(payload.payload.candidate));
                        } catch (e) { console.error(e); }
                    }
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        currentChannel.send({
                            type: 'broadcast',
                            event: 'viewer-joined',
                            payload: { viewerId }
                        });
                    }
                });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const idDesdeUrl = new URLSearchParams(window.location.search).get('id');
            if (idDesdeUrl) {
                document.getElementById('orderId').value = idDesdeUrl;
                buscar();
            }
        });
    </script>
</body>
</html>
