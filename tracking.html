<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rastreo de Orden | BlackHouse</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f0f0f; color: white; display: flex; justify-content: center; padding: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #10b981; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Rastrear Orden</h2>
        <input type="number" id="orderId" placeholder="Número de orden">
        <button onclick="buscar()">Buscar</button>
        <div id="resultado" style="margin-top: 20px;"></div>
    </div>

    <script>
        let supabaseClient;

        async function initSupabase() {
            if (supabaseClient) return supabaseClient;
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                supabaseClient = supabase.createClient(config.url, config.key);
                return supabaseClient;
            } catch (err) {
                console.error("Error cargando configuración de base de datos", err);
                return null;
            }
        }

        async function buscar() {
            const id = document.getElementById('orderId').value.trim();
            if (!id) return;
            
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = 'Buscando...';

            try {
                const res = await fetch('/api/db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'select',
                        table: 'ordenes',
                        select: 'modelo, estado, fecha_entrega',
                        match: { id: id },
                        single: true
                    })
                });
                
                const { data, error } = await res.json();
                
                if (error || !data) {
                    resultado.innerHTML = '<span style="color:red;">Orden no encontrada.</span>';
                } else {
                    resultado.innerHTML = `<strong>Modelo:</strong> ${data.modelo} <br> <strong>Estado:</strong> ${data.estado}`;
                }
            } catch (err) {
                console.error("Error al buscar orden", err);
                resultado.innerHTML = '<span style="color:red;">Error de conexión.</span>';
            }
        }
    </script>
</body>
</html>
