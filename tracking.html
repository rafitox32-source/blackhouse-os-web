<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rastreo de Reparación | BlackHouse OS</title>
    <meta name="description" content="Consulta en tiempo real el estado de la reparación de tu equipo.">
    <meta name="theme-color" content="#0b0b0c">
    <link rel="icon" href="/icon-512.png">
    <link rel="apple-touch-icon" href="/icon-512.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bh-dark: #0b0b0c;
            --bh-card: #121214;
            --bh-purple: #7c3aed;
            --bh-purple-hover: #6d28d9;
            --bh-green: #10b981;
            --bh-red: #ef4444;
            --bh-border: #26262a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100svh;
            background: radial-gradient(circle at top, rgba(124,58,237,0.10), transparent 45%), var(--bh-dark);
            color: #f4f4f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px calc(32px + env(safe-area-inset-bottom));
            padding-top: calc(32px + env(safe-area-inset-top));
        }
        .card {
            background: var(--bh-card);
            border: 1px solid var(--bh-border);
            padding: 28px 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .brand {
            text-align: center;
            margin-bottom: 4px;
        }
        .brand .wordmark {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.03em;
            color: #fff;
        }
        .brand .wordmark span { color: var(--bh-purple); }
        .brand .tagline {
            font-size: 12px;
            color: #8b8b93;
            margin-top: 2px;
        }
        h2 {
            margin: 20px 0 4px;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            color: #fff;
        }
        .sub {
            text-align: center;
            font-size: 13px;
            color: #8b8b93;
            margin: 0 0 20px;
        }
        .search-row {
            display: flex;
            gap: 8px;
        }
        .input-wrap {
            position: relative;
            flex: 1;
        }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b6b72;
            font-size: 13px;
        }
        input#orderId {
            width: 100%;
            padding: 13px 14px 13px 36px;
            border-radius: 12px;
            border: 1px solid var(--bh-border);
            background: #1a1a1d;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.15s ease;
        }
        input#orderId:focus { border-color: var(--bh-purple); }
        input#orderId::placeholder { color: #6b6b72; }
        button#btn-buscar {
            padding: 0 20px;
            background: var(--bh-purple);
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            transition: background 0.15s ease;
        }
        button#btn-buscar:hover { background: var(--bh-purple-hover); }
        button#btn-buscar:disabled { opacity: 0.6; cursor: default; }

        #resultado { margin-top: 20px; }

        .estado-box {
            background: #1a1a1d;
            border: 1px solid var(--bh-border);
            padding: 18px;
            border-radius: 14px;
        }
        .estado-box .taller-nombre {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--bh-purple);
            margin: 0 0 6px;
        }
        .estado-box .modelo {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            margin: 0 0 2px;
        }
        .estado-box .falla { font-size: 12px; color: #8b8b93; margin: 0; }

        .entrega-estimada {
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            color: #a1a1aa;
        }
        .saldo-box {
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1d;
            border: 1px solid var(--bh-border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
        }
        .saldo-box .valor { font-weight: 800; font-size: 15px; }
        .saldo-box .valor.pendiente { color: var(--bh-red); }
        .saldo-box .valor.saldado { color: var(--bh-green); }

        .evidencia-box {
            margin-top: 16px;
        }
        .evidencia-box p {
            font-size: 11px;
            font-weight: 700;
            color: #8b8b93;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin: 0 0 8px;
        }
        .evidencia-box img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--bh-border);
            display: block;
        }

        .msg-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
        }
        .msg-box.loading { background: rgba(124,58,237,0.10); color: #c4b5fd; }
        .msg-box.error { background: rgba(239,68,68,0.10); color: #fca5a5; }

        /* --- Timeline de estado --- */
        .timeline {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            position: relative;
        }
        .timeline::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 24px;
            right: 24px;
            height: 2px;
            background: var(--bh-border);
            z-index: 0;
        }
        .timeline .fill-line {
            position: absolute;
            top: 15px;
            left: 24px;
            right: 24px;
            height: 2px;
            background: var(--bh-purple);
            z-index: 1;
            transform-origin: left center;
            transition: transform 0.4s ease;
        }
        .step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .step .dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #1a1a1d;
            border: 2px solid var(--bh-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #6b6b72;
            transition: all 0.2s ease;
        }
        .step.done .dot {
            background: var(--bh-purple);
            border-color: var(--bh-purple);
            color: #fff;
        }
        .step.current .dot {
            background: var(--bh-green);
            border-color: var(--bh-green);
            color: #05221a;
            box-shadow: 0 0 0 4px rgba(16,185,129,0.18);
        }
        .step .label {
            margin-top: 6px;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            color: #6b6b72;
            max-width: 60px;
            line-height: 1.2;
        }
        .step.done .label, .step.current .label { color: #d4d4d8; }

        .estado-actual {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(16,185,129,0.12);
            color: var(--bh-green);
            font-size: 12px;
            font-weight: 700;
        }
        .estado-actual.otro { background: rgba(124,58,237,0.12); color: #c4b5fd; }

        #video-container {
            margin-top: 18px;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--bh-border);
            display: none;
        }
        video { width: 100%; display: block; }
        .video-tag {
            padding: 10px 12px;
            background: #1a1a1d;
            text-align: left;
            font-size: 12px;
            color: #a1a1aa;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--bh-red);
            color: white;
            padding: 3px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.55; } 100% { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(196,181,253,0.3);
            border-top-color: #c4b5fd;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        .whatsapp-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--bh-border);
            font-size: 12px;
            color: #8b8b93;
        }
        .whatsapp-cta a { color: var(--bh-green); font-weight: 700; text-decoration: none; }
        .whatsapp-cta a:hover { text-decoration: underline; }

        .card + .card { margin-top: 16px; }
        .tienda-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .tienda-header i { color: var(--bh-purple); }
        .tienda-header h3 { margin: 0; font-size: 15px; color: #fff; }
        .tienda-sub { font-size: 12px; color: #8b8b93; margin: 0 0 16px; }

        .tienda-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            border-top: 1px solid var(--bh-border);
        }
        .tienda-item:first-of-type { border-top: none; }
        .tienda-item .foto {
            width: 44px; height: 44px;
            border-radius: 10px;
            object-fit: cover;
            background: #1a1a1d;
            border: 1px solid var(--bh-border);
            flex-shrink: 0;
        }
        .tienda-item .foto-vacia {
            width: 44px; height: 44px;
            border-radius: 10px;
            background: #1a1a1d;
            border: 1px solid var(--bh-border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3f3f46;
            font-size: 16px;
        }
        .tienda-item .info { flex: 1; min-width: 0; }
        .tienda-item .nombre { font-size: 13px; font-weight: 700; color: #fff; }
        .tienda-item .precio { font-size: 12px; color: var(--bh-green); font-weight: 700; }
        .tienda-item .stepper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1d;
            border: 1px solid var(--bh-border);
            border-radius: 10px;
            padding: 4px 6px;
        }
        .tienda-item .stepper button {
            width: 22px; height: 22px;
            border-radius: 6px;
            border: none;
            background: #26262a;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }
        .tienda-item .stepper span { min-width: 16px; text-align: center; font-weight: 700; font-size: 13px; }

        .tienda-carrito {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed var(--bh-border);
        }
        .tienda-carrito .subtotal {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #d4d4d8;
            margin-bottom: 12px;
        }
        .tienda-carrito .subtotal strong { color: var(--bh-green); }
        .btn-pedir {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: var(--bh-green);
            color: #052e22;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-pedir:disabled { opacity: 0.4; cursor: default; }
        .tienda-vacio { font-size: 12px; color: #6b6b72; text-align: center; padding: 8px 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="wordmark">BlackHouse<span>OS</span></div>
            <div class="tagline">Rastreo de reparación en tiempo real</div>
        </div>

        <h2>¿Cómo va mi equipo?</h2>
        <p class="sub">Ingresa el número de orden que te dieron al recibir tu equipo.</p>

        <div class="search-row">
            <div class="input-wrap">
                <i class="fa-solid fa-hashtag"></i>
                <input type="number" id="orderId" placeholder="N° de orden" inputmode="numeric">
            </div>
            <button id="btn-buscar" onclick="buscar()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div id="resultado"></div>

        <div id="video-container"></div>

        <div id="whatsapp-cta-container"></div>
    </div>

    <div id="tienda-card" class="card" style="display:none;"></div>

    <script>
        let supabaseClient;
        let peerConnection;
        let currentChannel;

        // El token solo llega por la URL (QR escaneado o link de WhatsApp), nunca
        // se puede escribir a mano. Si el cliente cambia el número en el buscador,
        // el token deja de ser válido para ese nuevo número (ver buscar()).
        let idDesdeUrlActual = null;
        let tokenDesdeUrlActual = null;

        const SELECT_BASICO = 'modelo, estado, modo_transmision, video_url';
        const SELECT_EXTENDIDO = 'modelo, estado, modo_transmision, video_url, empresa_id, fecha_cita, saldo, evidencia';

        // Orden real de estados en el flujo de reparación (coincide 1:1 con las
        // opciones del select en el panel de escritorio: Recibido -> En Proceso
        // -> Completado -> Entregado). Si el backend manda un estado que no está
        // en esta lista (ej. "Devuelto"), no se rompe: simplemente no se pinta
        // el timeline y se muestra el estado en texto plano.
        const PASOS = [
            { key: 'Recibido', label: 'Recibido', icon: 'fa-inbox' },
            { key: 'En Proceso', label: 'En proceso', icon: 'fa-screwdriver-wrench' },
            { key: 'Completado', label: 'Listo', icon: 'fa-circle-check' },
            { key: 'Entregado', label: 'Entregado', icon: 'fa-box' },
        ];

        async function initSupabase() {
            if (supabaseClient) return supabaseClient;
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                supabaseClient = supabase.createClient(config.url, config.key);
                return supabaseClient;
            } catch (err) {
                console.error("Error cargando configuración de BD", err);
                return null;
            }
        }

        function renderTimeline(estadoActual) {
            const idx = PASOS.findIndex(p => p.key === estadoActual);
            if (idx === -1) {
                return `<div class="estado-actual otro"><i class="fa-solid fa-circle-info"></i> ${escaparHtml(estadoActual)}</div>`;
            }
            const fraccion = idx / (PASOS.length - 1);
            const steps = PASOS.map((p, i) => {
                const cls = i < idx ? 'done' : (i === idx ? 'current' : '');
                const iconoInterno = i < idx ? 'fa-check' : p.icon;
                return `
                    <div class="step ${cls}">
                        <div class="dot"><i class="fa-solid ${iconoInterno}"></i></div>
                        <div class="label">${p.label}</div>
                    </div>`;
            }).join('');
            return `
                <div class="timeline">
                    <div class="fill-line" style="transform: scaleX(${fraccion});"></div>
                    ${steps}
                </div>
                <div style="text-align:center;">
                    <span class="estado-actual"><i class="fa-solid fa-circle-dot" style="font-size:8px;"></i> ${escaparHtml(estadoActual)}</span>
                </div>`;
        }

        function escaparHtml(txt) {
            const d = document.createElement('div');
            d.textContent = txt || '';
            return d.innerHTML;
        }

        function formatearFecha(fecha) {
            if (!fecha) return null;
            try {
                return new Date(fecha + 'T00:00:00').toLocaleDateString('es-PE', { day: 'numeric', month: 'long', year: 'numeric' });
            } catch (e) {
                return fecha;
            }
        }

        // Muestra el WhatsApp REAL del taller (empresas.telefono). Si el taller
        // todavia no lo configuro (hoy es el caso de la mayoria), no se muestra
        // ningun boton en vez de apuntar a un numero que no es el del taller.
        function renderWhatsappCta(telefonoTaller) {
            const cont = document.getElementById('whatsapp-cta-container');
            if (!telefonoTaller) { cont.innerHTML = ''; return; }
            const soloDigitos = String(telefonoTaller).replace(/\D/g, '');
            const mensaje = encodeURIComponent('Hola, tengo una consulta sobre mi reparación.');
            cont.innerHTML = `
                <div class="whatsapp-cta">
                    <i class="fa-brands fa-whatsapp" style="color:var(--bh-green);"></i>
                    ¿Dudas con tu equipo? <a href="https://api.whatsapp.com/send?phone=51${soloDigitos}&text=${mensaje}" target="_blank" rel="noopener">Escríbenos</a>
                </div>`;
        }

        // --- TIENDA DE ACCESORIOS MIENTRAS ESPERA ---
        // El pedido queda PENDIENTE (accion "pedido_accesorio" en api/db.js):
        // no modifica costo/saldo de la orden solo, eso lo hace un humano del
        // taller al revisarlo. Solo se puede usar si se tiene el tracking_token
        // exacto de esa orden (no alcanza con adivinar el numero).
        let carritoAccesorios = {};
        let ordenIdTienda = null;
        let tokenTiendaActual = null;

        // La mica del equipo se busca por modelo contra "modelo_compatible" del
        // producto. No se muestran las decenas de micas de otros modelos: como
        // mucho, UNA fila con el precio real de la mica que sirve para el equipo
        // de esta orden.
        //
        // El nombre que escribe el tecnico en la orden ("SAMSUNG A71") casi nunca
        // es literal al de un inventario que dice "Galaxy A71 / Galaxy A72", asi
        // que un simple "incluye este texto" no alcanza. En vez de eso se compara
        // por el CODIGO de modelo (el token alfanumerico con algun digito, ej.
        // "A71", "X6A", "S22"): si el pedido y la mica comparten ese codigo exacto,
        // se consideran el mismo equipo aunque la marca este escrita distinto.
        function normalizarModeloTienda(txt) {
            return (txt || '').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^A-Z0-9 /]/g, '').replace(/\s+/g, ' ').trim();
        }
        function codigosModeloTienda(txt) {
            return normalizarModeloTienda(txt).split(/[\s/]+/).filter(tok => tok.length >= 2 && /\d/.test(tok));
        }

        async function cargarTienda(empresaId, ordenId, modeloOrden, trackingToken) {
            const cardTienda = document.getElementById('tienda-card');
            ordenIdTienda = ordenId;
            tokenTiendaActual = trackingToken;
            carritoAccesorios = {};

            try {
                const res = await fetch('/api/db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'select', table: 'productos', select: 'id, nombre, precio, stock, categoria, modelo_compatible, foto_url',
                        match: { empresa_id: empresaId }, order: { column: 'nombre', ascending: true }, limit: 100
                    })
                });
                const { data: todos, error } = await res.json();

                if (error || !todos || todos.length === 0) { cardTienda.style.display = 'none'; return; }

                const accesorios = todos.filter(p => p.categoria === 'Accesorios');
                const codigosOrden = codigosModeloTienda(modeloOrden);
                const micaDelEquipo = codigosOrden.length
                    ? todos.find(p => {
                        if (p.categoria !== 'Micas') return false;
                        const codigosMica = codigosModeloTienda(p.modelo_compatible);
                        if (!codigosMica.length) return false; // sin modelo cargado: no adivinar, mejor no mostrarla
                        return codigosMica.some(c => codigosOrden.includes(c));
                    })
                    : null;

                const data = micaDelEquipo ? [...accesorios, micaDelEquipo] : accesorios;
                if (data.length === 0) { cardTienda.style.display = 'none'; return; }

                cardTienda.style.display = 'block';
                cardTienda.innerHTML = `
                    <div class="tienda-header"><i class="fa-solid fa-bag-shopping"></i><h3>Mientras esperas</h3></div>
                    <p class="tienda-sub">¿Quieres aprovechar y pedir algún accesorio junto con tu equipo?</p>
                    <div id="tienda-lista">
                        ${data.map(p => `
                            <div class="tienda-item">
                                ${p.foto_url
                                    ? `<img class="foto" src="${p.foto_url}" alt="${escaparHtml(p.nombre)}">`
                                    : `<div class="foto-vacia"><i class="fa-solid fa-image"></i></div>`}
                                <div class="info">
                                    <div class="nombre">${escaparHtml(p.nombre)}</div>
                                    <div class="precio">S/ ${Number(p.precio || 0).toFixed(2)}</div>
                                </div>
                                <div class="stepper">
                                    <button onclick="cambiarCantidadAccesorio(${p.id}, -1, '${escaparHtml(p.nombre).replace(/'/g, "\\'")}',  ${Number(p.precio || 0)})">−</button>
                                    <span id="cant-${p.id}">0</span>
                                    <button onclick="cambiarCantidadAccesorio(${p.id}, 1, '${escaparHtml(p.nombre).replace(/'/g, "\\'")}', ${Number(p.precio || 0)})">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="tienda-carrito">
                        <div class="subtotal"><span>Subtotal del pedido</span><strong id="tienda-subtotal">S/ 0.00</strong></div>
                        <button class="btn-pedir" id="btn-pedir-tienda" disabled onclick="confirmarPedidoAccesorios()">
                            <i class="fa-solid fa-cart-shopping"></i> Confirmar pedido
                        </button>
                        <p style="font-size:11px; color:#6b6b72; text-align:center; margin:10px 0 0;">Un técnico del taller lo revisará y lo sumará a tu orden #${escaparHtml(String(ordenIdTienda))}. Lo pagas junto con tu reparación al recogerla.</p>
                    </div>
                `;
            } catch (e) {
                console.error('No se pudo cargar la tienda de accesorios', e);
                cardTienda.style.display = 'none';
            }
        }

        function cambiarCantidadAccesorio(id, delta, nombre, precio) {
            const actual = carritoAccesorios[id] || { nombre, precio, cantidad: 0 };
            actual.cantidad = Math.max(0, actual.cantidad + delta);
            if (actual.cantidad === 0) delete carritoAccesorios[id];
            else carritoAccesorios[id] = actual;

            document.getElementById(`cant-${id}`).textContent = actual.cantidad;

            const items = Object.values(carritoAccesorios);
            const subtotal = items.reduce((s, it) => s + it.precio * it.cantidad, 0);
            document.getElementById('tienda-subtotal').textContent = 'S/ ' + subtotal.toFixed(2);
            document.getElementById('btn-pedir-tienda').disabled = items.length === 0;
        }

        async function confirmarPedidoAccesorios() {
            const items = Object.entries(carritoAccesorios).map(([id, it]) => ({ producto_id: Number(id), cantidad: it.cantidad }));
            if (items.length === 0 || !tokenTiendaActual) return;

            const btn = document.getElementById('btn-pedir-tienda');
            const textoOriginal = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Enviando...';

            const cardTienda = document.getElementById('tienda-card');
            try {
                const res = await fetch('/api/db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'pedido_accesorio', orden_id: ordenIdTienda, tracking_token: tokenTiendaActual, items })
                });
                const { success, error } = await res.json();

                if (!success) {
                    btn.disabled = false;
                    btn.innerHTML = textoOriginal;
                    let msg = document.getElementById('tienda-error-msg');
                    if (!msg) {
                        msg = document.createElement('div');
                        msg.id = 'tienda-error-msg';
                        msg.className = 'msg-box error';
                        msg.style.marginTop = '12px';
                        cardTienda.appendChild(msg);
                    }
                    msg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${escaparHtml(error || 'No se pudo enviar el pedido.')}`;
                    return;
                }

                carritoAccesorios = {};
                cardTienda.innerHTML = `
                    <div class="tienda-header"><i class="fa-solid fa-circle-check" style="color:var(--bh-green);"></i><h3>¡Pedido enviado!</h3></div>
                    <p class="tienda-sub" style="margin-bottom:0;">Quedó registrado junto a tu orden #${escaparHtml(String(ordenIdTienda))}. Un técnico del taller lo va a revisar y sumarlo a tu cuenta — lo pagas junto con tu reparación al recogerla.</p>
                `;
            } catch (e) {
                console.error('Error enviando el pedido de accesorios', e);
                btn.disabled = false;
                btn.innerHTML = textoOriginal;
            }
        }

        async function buscar() {
            const id = document.getElementById('orderId').value.trim();
            if (!id) return;

            const resultado = document.getElementById('resultado');
            const vContainer = document.getElementById('video-container');
            const btn = document.getElementById('btn-buscar');
            btn.disabled = true;
            resultado.innerHTML = '<div class="msg-box loading"><div class="spinner"></div> Buscando tu orden...</div>';
            vContainer.style.display = 'none';
            vContainer.innerHTML = '';

            if (currentChannel) {
                currentChannel.unsubscribe();
                currentChannel = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            renderWhatsappCta(null);
            document.getElementById('tienda-card').style.display = 'none';

            // Solo se pide la version extendida (saldo, foto, nombre del taller) si
            // el numero que se esta buscando es EXACTAMENTE el que vino con token en
            // la URL (QR o link de WhatsApp). Si el cliente escribe otro numero a
            // mano, no hay token para ese numero y se usa la consulta basica.
            const tieneToken = tokenDesdeUrlActual && id === idDesdeUrlActual;
            const cuerpo = {
                action: 'select',
                table: 'ordenes',
                select: tieneToken ? SELECT_EXTENDIDO : SELECT_BASICO,
                match: tieneToken ? { id: id, tracking_token: tokenDesdeUrlActual } : { id: id },
                single: true
            };

            try {
                const res = await fetch('/api/db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cuerpo)
                });

                const { data, error } = await res.json();

                if (error || !data) {
                    resultado.innerHTML = '<div class="msg-box error"><i class="fa-solid fa-triangle-exclamation"></i> No encontramos esa orden. Revisa el número e intenta de nuevo.</div>';
                } else {
                    let tallerHtml = '';
                    if (tieneToken && data.empresa_id) {
                        try {
                            const resEmpresa = await fetch('/api/db', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    action: 'select', table: 'empresas', select: 'nombre, telefono',
                                    match: { id: data.empresa_id }, single: true
                                })
                            });
                            const { data: empresa } = await resEmpresa.json();
                            if (empresa && empresa.nombre) {
                                tallerHtml = `<p class="taller-nombre"><i class="fa-solid fa-shop"></i> ${escaparHtml(empresa.nombre)}</p>`;
                            }
                            renderWhatsappCta(empresa ? empresa.telefono : null);
                        } catch (e) { console.error('No se pudo cargar el taller', e); }

                        // La tienda no depende del telefono del taller (el pedido ya no
                        // se manda por WhatsApp, queda pendiente en el sistema).
                        cargarTienda(data.empresa_id, id, data.modelo, tokenDesdeUrlActual);
                    }

                    const fechaEstim = tieneToken ? formatearFecha(data.fecha_cita) : null;
                    const entregaHtml = (fechaEstim && data.estado !== 'Entregado')
                        ? `<div class="entrega-estimada"><i class="fa-regular fa-calendar"></i> Entrega estimada: <strong style="color:#d4d4d8;">${escaparHtml(fechaEstim)}</strong></div>`
                        : '';

                    let saldoHtml = '';
                    if (tieneToken && typeof data.saldo === 'number') {
                        const pendiente = data.saldo > 0;
                        saldoHtml = `
                            <div class="saldo-box">
                                <span>${pendiente ? 'Saldo pendiente' : 'Estado de cuenta'}</span>
                                <span class="valor ${pendiente ? 'pendiente' : 'saldado'}">${pendiente ? 'S/ ' + data.saldo.toFixed(2) : 'Sin saldo pendiente ✓'}</span>
                            </div>`;
                    }

                    let evidenciaHtml = '';
                    if (tieneToken && data.evidencia) {
                        evidenciaHtml = `
                            <div class="evidencia-box">
                                <p><i class="fa-solid fa-camera"></i> Así lo recibimos</p>
                                <img src="${data.evidencia}" alt="Foto del equipo al recibirlo">
                            </div>`;
                    }

                    resultado.innerHTML = `
                        <div class="estado-box">
                            ${tallerHtml}
                            <p class="modelo">${escaparHtml(data.modelo)}</p>
                            ${renderTimeline(data.estado)}
                            ${entregaHtml}
                            ${saldoHtml}
                            ${evidenciaHtml}
                        </div>
                    `;

                    if (data.modo_transmision === 'Grabado' && data.video_url) {
                        vContainer.style.display = 'block';
                        vContainer.innerHTML = `
                            <div class="video-tag"><i class="fa-solid fa-video"></i> Reparación grabada</div>
                            <video src="${data.video_url}" controls playsinline></video>
                        `;
                    } else if (data.modo_transmision === 'En Vivo') {
                        vContainer.style.display = 'block';
                        vContainer.innerHTML = `
                            <div class="video-tag"><span class="live-badge"><i class="fa-solid fa-tower-broadcast" style="font-size:9px;"></i> EN VIVO</span> Conectando con el laboratorio...</div>
                            <video id="liveVideo" autoplay playsinline muted></video>
                        `;
                        conectarEnVivo(id);
                    }
                }
            } catch (err) {
                console.error("Error al buscar", err);
                resultado.innerHTML = '<div class="msg-box error"><i class="fa-solid fa-plug-circle-exclamation"></i> Error de conexión. Intenta nuevamente.</div>';
            } finally {
                btn.disabled = false;
            }
        }

        async function conectarEnVivo(ordenId) {
            const client = await initSupabase();
            if (!client) return;

            const roomName = 'reparacion_' + ordenId;
            currentChannel = client.channel(roomName);
            const viewerId = 'viewer_' + Math.random().toString(36).substr(2, 9);
            const videoEl = document.getElementById('liveVideo');

            peerConnection = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });

            peerConnection.ontrack = (event) => {
                if (videoEl.srcObject !== event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                    videoEl.play().catch(e => {
                        videoEl.muted = true;
                        videoEl.play();
                    });
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    currentChannel.send({
                        type: 'broadcast',
                        event: 'ice-candidate',
                        payload: { viewerId, candidate: event.candidate }
                    });
                }
            };

            currentChannel
                .on('broadcast', { event: 'offer' }, async (payload) => {
                    if (payload.payload.viewerId === viewerId) {
                        const offer = payload.payload.offer;
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        currentChannel.send({
                            type: 'broadcast',
                            event: 'answer',
                            payload: { viewerId, answer }
                        });
                    }
                })
                .on('broadcast', { event: 'ice-candidate' }, async (payload) => {
                    if (payload.payload.viewerId === viewerId) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(payload.payload.candidate));
                        } catch (e) { console.error(e); }
                    }
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        currentChannel.send({
                            type: 'broadcast',
                            event: 'viewer-joined',
                            payload: { viewerId }
                        });
                    }
                });
        }

        document.getElementById('orderId').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') buscar();
        });

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const idDesdeUrl = params.get('id');
            if (idDesdeUrl) {
                idDesdeUrlActual = idDesdeUrl;
                tokenDesdeUrlActual = params.get('t');
                document.getElementById('orderId').value = idDesdeUrl;
                buscar();
            }
        });
    </script>
