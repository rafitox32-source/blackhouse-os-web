<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - BlackHouse OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bh-purple: #7c3aed;
            --bh-purple-glow: rgba(124, 58, 237, 0.5);
            --bh-bg-dark: #030008;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bh-bg-dark);
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #e0e0e0; 
            height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        body::after {
            content: ""; position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at center, transparent 10%, #030008 85%);
            z-index: 1; pointer-events: none;
        }

        @keyframes rotateElectric {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .login-card {
            position: relative; width: 400px; max-width: 90%; padding: 40px; 
            border-radius: 24px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2); z-index: 2;
            overflow: hidden;
        }

        .login-card::before {
            content: ""; position: absolute; top: 50%; left: 50%; width: 200%; height: 200%;
            background: conic-gradient(transparent 70%, rgba(0, 243, 255, 0.8) 90%, #ffffff 100%);
            transform: translate(-50%, -50%); animation: rotateElectric 3s linear infinite; z-index: -2;
        }

        .login-card::after {
            content: ""; position: absolute; inset: 2px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            border-radius: 22px; z-index: -1;
        }

        .login-card > * { position: relative; z-index: 1; }

        .login-logo {
            font-size: 28px; font-weight: 800; color: white; margin-bottom: 25px;
            text-shadow: 0 0 20px var(--bh-purple-glow);
        }

        .bh-input { 
            width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; padding: 15px 20px; border-radius: 12px; outline: none; 
            transition: all 0.3s ease; font-size: 14px; margin-bottom: 20px;
        }

        .bh-input:focus { 
            border-color: #7c3aed; background: rgba(124, 58, 237, 0.08);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2);
        }

        .bh-btn-purple { 
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%); color: white; 
            border: none; width: 100%; height: 45px; border-radius: 12px; font-weight: 600; 
            cursor: pointer; font-size: 14px; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            transition: transform 0.2s;
        }
        .bh-btn-purple:active { transform: scale(0.98); }

        label { display: block; text-align: left; color: #aaa; font-size: 11px; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px;}
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="login-logo">BlackHouse<span style="color:var(--bh-purple)">OS</span></h1>
        
        <div style="margin-bottom: 25px;">
            <h3 style="color: white; font-size: 18px; margin-bottom: 5px;">Nueva Contraseña</h3>
            <p style="color: #666; font-size: 12px;">Crea una clave segura para proteger el acceso a tu taller.</p>
        </div>

        <div id="form-container">
            <label>NUEVA CONTRASEÑA</label>
            <input type="password" id="new-password" class="bh-input" placeholder="Mínimo 6 caracteres">

            <label>CONFIRMAR CONTRASEÑA</label>
            <input type="password" id="confirm-password" class="bh-input" placeholder="Repite tu contraseña">

            <button class="bh-btn-purple" onclick="actualizarPasswordWeb()">Actualizar Contraseña ✅</button>
            <p id="msg-error" style="color:var(--danger); margin-top:12px; font-size:13px; min-height:15px;"></p>
        </div>
    </div>

    <script>
        // Inicializamos Supabase en la Web utilizando tus credenciales
        let supabaseWeb;
        async function initSupabase() {
            if (supabaseWeb) return supabaseWeb;
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                supabaseWeb = supabase.createClient(config.url, config.key);
                return supabaseWeb;
            } catch (err) {
                console.error("Error cargando configuración de BD:", err);
                return null;
            }
        }

        async function actualizarPasswordWeb() {
            const pass = document.getElementById('new-password').value.trim();
            const confirmPass = document.getElementById('confirm-password').value.trim();
            const errorLabel = document.getElementById('msg-error');

            // 1. Validaciones básicas
            if(pass.length < 6) {
                errorLabel.style.color = "var(--danger)";
                errorLabel.innerText = "⚠️ La contraseña debe tener al menos 6 caracteres.";
                return;
            }

            if(pass !== confirmPass) {
                errorLabel.style.color = "var(--danger)";
                errorLabel.innerText = "⚠️ Las contraseñas no coinciden.";
                return;
            }

            errorLabel.style.color = "var(--bh-purple)";
            errorLabel.innerText = "Procesando...";

            try {
                const client = await initSupabase();
                if (!client) throw new Error("No se pudo conectar a la base de datos");

                // 2. Supabase detecta automáticamente el código secreto (token) en la URL de Vercel
                const { data, error } = await client.auth.updateUser({ password: pass });

                if (error) {
                    errorLabel.style.color = "var(--danger)";
                    errorLabel.innerText = "❌ Error: " + error.message;
                } else {
                    // 3. Éxito: Ocultamos el formulario y mostramos un mensaje de victoria
                    document.getElementById('form-container').innerHTML = `
                        <div style="padding: 20px 0; color: var(--success); font-weight: bold; font-size: 16px;">
                            <i class='bx bx-check-circle text-4xl mb-2'></i><br>
                            ¡Contraseña actualizada!<br>
                            <span style="color:#aaa; font-size:13px; font-weight:normal; display:block; margin-top:15px; line-height: 1.5;">
                                Tu cuenta está segura. Ya puedes cerrar esta ventana e iniciar sesión en tu panel de BlackHouse OS con tu nueva clave.
                            </span>
                        </div>
                    `;
                }
            } catch (err) {
                errorLabel.style.color = "var(--danger)";
                errorLabel.innerText = "❌ Error interno. Verifica tu conexión.";
            }
        }
    </script>
</body>
</html>
